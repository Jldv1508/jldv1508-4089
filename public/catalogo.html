<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalogo de bisuteria y conchas</title>
  <link rel="stylesheet" href="styles.css?v=20260701-catalog-color">
</head>
<body class="home" data-edit-user="admin" data-edit-password="password">
  <header class="home-topbar">
    <a class="home-logo" href="/">jldv1508</a>
    <button class="home-edit" type="button">Edición</button>
  </header>
  <main class="home-main">
    <section class="choice-screen catalog-entry" aria-label="Catálogo">
      <div class="choice-intro">
        <p>Selección</p>
        <h2>Elige la colección que quieres abrir.</h2>
      </div>
      <div class="choice-grid">
        <a class="choice-card choice-bisut" href="/bisuteria">
          <span class="choice-media"><img src="imagenes/lote-003/215-pulsera_003-BISU-PUL-005-M01C02P02-03.webp" alt="Bisutería"></span>
          <span class="choice-copy">
            <strong>Bisutería</strong>
            <small>Piezas filtrables y con visor ampliado.</small>
          </span>
        </a>
        <a class="choice-card choice-conchas" href="/conchas">
          <span class="choice-media"><img src="imagenes/conchas/lote-001/195-IMG_2239.webp" alt="Conchas"></span>
          <span class="choice-copy">
            <strong>Conchas</strong>
            <small>Catálogo visual con el mismo flujo operativo.</small>
          </span>
        </a>
      </div>
    </section>
  </main>
  <script src="/edit-access.js" defer></script>

</html>
